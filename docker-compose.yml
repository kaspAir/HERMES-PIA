services:

  # ── Produktion (main-Branch) ─────────────────────────────────────────────
  hermespia-prod:
    image: hermespia:prod
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - hermespia-prod-data:/app/data
    env_file:
      - /opt/hermespia/secrets/prod.env
    environment:
      DATABASE_URL: sqlite:////app/data/hermespia.db
      FLASK_DEBUG: "0"

  # ── Test (test-Branch) ───────────────────────────────────────────────────
  hermespia-test:
    image: hermespia:test
    build: .
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - hermespia-test-data:/app/data
    env_file:
      - /opt/hermespia/secrets/test.env
    environment:
      DATABASE_URL: sqlite:////app/data/hermespia.db
      FLASK_DEBUG: "0"

volumes:
  hermespia-prod-data:
  hermespia-test-data:
