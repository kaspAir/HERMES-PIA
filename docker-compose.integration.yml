services:
  methodos:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:////data/methodos.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - METHODOS_LLM_MODEL=${METHODOS_LLM_MODEL:-claude-sonnet-4-6}
    volumes:
      - methodos_data:/data
    restart: unless-stopped

volumes:
  methodos_data:
