services:
  hermespia:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=sqlite:////data/hermespia.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HERMESPIA_LLM_MODEL=${HERMESPIA_LLM_MODEL:-claude-sonnet-4-6}
    volumes:
      - hermespia_data:/data
    restart: unless-stopped

volumes:
  hermespia_data:
